<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathable - Contact</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="contact-page">

<header>
  <div class="nav-container">
    <div class="logo">
      <div class="logo-text">
        <span class="path">Path</span><span class="able">able</span>
      </div>
      <div class="subtitle">Physiotherapy</div>
    </div>

    <button class="menu-toggle" aria-label="메뉴 열기">☰</button>
    
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

  <main>
        <section class="hero-title">
        <h2>Contact Us</h2>
        </section>

        <section class="hero-content">
  <p>Email: <a href="mailto:info@pathable.com.au">info@pathable.com.au</a></p>
  <p>Phone: 04XX XXX XXX</p>

  <h2>Contact Form</h2>
  
  <form id="contactForm">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    
    <div class="form-group">
      <label for="enquiry">Enquiry</label>
      <textarea id="enquiry" name="enquiry" rows="5" required></textarea>
    </div>
    
    <button type="submit">Send Message</button>
  </form>
  
  <div id="form-message"></div>
</section>
    </main>

  <footer>
    <p>&copy; 2025 Pathable. All rights reserved.</p>
  </footer>

<script src="js/main.js"></script>
</body>
</html>
